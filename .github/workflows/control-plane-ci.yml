name: control-plane-ci

on:
  push:
    branches:
      - main
      - feature/**
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go-control-plane/go.mod

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Python verification
        run: |
          python -m compileall main.py api core platforms services
          pytest tests/test_risk_hardening.py -q

      - name: Go verification
        working-directory: go-control-plane
        run: go test ./...

      - name: Frontend verification
        working-directory: frontend
        run: npm run build
